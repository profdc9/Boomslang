[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; ESP32-S3 uses its native USB for Serial; these two flags route Serial
; over that port instead of expecting a separate USB-UART bridge chip.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
